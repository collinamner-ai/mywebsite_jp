<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>JemsPantry - Coming Soon</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #032416;
      --bg-mid: #06402b;
      --cream: #f5e6d3;
      --gold: #f4d58d;
      --gold-soft: rgba(244, 213, 141, 0.45);
      --spark: #fff8dd;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #0a5a3d 0%, #06402b 42%, #032416 100%);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    /* Soft background glow */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 35%, rgba(85, 255, 180, 0.08), transparent 28%),
        radial-gradient(circle at 50% 60%, rgba(255, 228, 160, 0.05), transparent 20%);
      pointer-events: none;
      z-index: 0;
    }

    /* Background stars */
    .stars-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 249, 220, 1) 0%, rgba(255, 249, 220, 0.9) 25%, rgba(255, 249, 220, 0.12) 60%, rgba(255, 249, 220, 0) 100%);
      opacity: 0.15;
      animation: starPulse var(--dur) ease-in-out infinite;
      filter: blur(0.2px);
    }

    .star.cross::before,
    .star.cross::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 246, 220, 0.9);
      border-radius: 999px;
      box-shadow: 0 0 10px rgba(255, 230, 170, 0.35);
    }

    .star.cross::before {
      width: 1px;
      height: 180%;
    }

    .star.cross::after {
      width: 180%;
      height: 1px;
    }

    @keyframes starPulse {
      0%, 100% {
        opacity: 0.12;
        transform: scale(0.9);
      }
      50% {
        opacity: 0.9;
        transform: scale(1.22);
      }
    }

    /* Main container - no float-in animation now */
    .container {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 2vh;
    }

    .image-wrapper {
      position: relative;
      width: min(100vw, 880px);
      display: flex;
      justify-content: center;
      align-items: center;
      isolation: isolate;
    }

    .image-wrapper picture,
    .image-wrapper img {
      display: block;
      width: 100%;
      height: auto;
    }

    .image-wrapper img {
      border-radius: 0;
      object-fit: contain;
      /* no entry animation */
    }

    /* Magical centre glow around Jem + phone area */
    .magic-focus {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
    }

    .magic-focus::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 44%;
      width: min(34vw, 300px);
      height: min(34vw, 300px);
      transform: translate(-50%, -50%);
      background:
        radial-gradient(circle, rgba(255, 230, 150, 0.22) 0%, rgba(255, 230, 150, 0.08) 35%, rgba(255, 230, 150, 0) 72%);
      filter: blur(12px);
      animation: breatheGlow 5s ease-in-out infinite;
    }

    .magic-focus::after {
      content: "";
      position: absolute;
      left: 54%;
      top: 49%;
      width: min(24vw, 180px);
      height: min(24vw, 180px);
      transform: translate(-50%, -50%);
      background:
        radial-gradient(circle, rgba(255, 248, 220, 0.2) 0%, rgba(255, 248, 220, 0.08) 45%, transparent 75%);
      filter: blur(10px);
      animation: breatheGlow 4s ease-in-out infinite reverse;
    }

    @keyframes breatheGlow {
      0%, 100% {
        opacity: 0.65;
        transform: translate(-50%, -50%) scale(0.96);
      }
      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.06);
      }
    }

    /* SVG swirls */
    .magic-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .swirl-path {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .trail-back {
      stroke: rgba(255, 224, 145, 0.14);
      stroke-width: 10;
      filter: blur(6px);
    }

    .trail-mid {
      stroke: rgba(255, 221, 120, 0.35);
      stroke-width: 4;
      stroke-dasharray: 8 14 18 12;
      animation: dashFlow 12s linear infinite;
      filter: drop-shadow(0 0 8px rgba(255, 220, 130, 0.35));
    }

    .trail-front {
      stroke: rgba(255, 245, 205, 0.95);
      stroke-width: 1.8;
      stroke-dasharray: 2 10 1 16;
      animation: dashFlow 8s linear infinite;
      filter:
        drop-shadow(0 0 5px rgba(255, 239, 190, 0.95))
        drop-shadow(0 0 12px rgba(255, 210, 120, 0.6));
    }

    @keyframes dashFlow {
      from {
        stroke-dashoffset: 0;
      }
      to {
        stroke-dashoffset: -220;
      }
    }

    /* Floating sparkle particles following the swirls */
    .sparkle-dot {
      r: 2.2;
      fill: #fff8dd;
      filter: drop-shadow(0 0 6px rgba(255, 228, 145, 0.95));
      animation: sparkleBlink 2.2s ease-in-out infinite;
      transform-origin: center;
    }

    .sparkle-dot.soft {
      r: 1.6;
      opacity: 0.7;
    }

    .sparkle-dot.large {
      r: 3.2;
    }

    @keyframes sparkleBlink {
      0%, 100% {
        opacity: 0.3;
        transform: scale(0.7);
      }
      50% {
        opacity: 1;
        transform: scale(1.35);
      }
    }

    /* Mobile tuning */
    @media (max-width: 900px) {
      .container {
        padding-top: 0;
        align-items: flex-start;
      }

      .image-wrapper {
        width: 100vw;
      }
    }

    @media (max-width: 480px) {
      .magic-focus::before {
        width: 220px;
        height: 220px;
        top: 45%;
      }

      .magic-focus::after {
        width: 150px;
        height: 150px;
        top: 50%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .star,
      .trail-mid,
      .trail-front,
      .sparkle-dot,
      .magic-focus::before,
      .magic-focus::after {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <!-- Softer background stars -->
  <div class="stars-container">
    <div class="star cross" style="left:2%; top:15%; width:10px; height:10px; --dur: 4.8s;"></div>
    <div class="star" style="left:8%; top:58%; width:7px; height:7px; --dur: 5.2s;"></div>
    <div class="star cross" style="left:13%; top:82%; width:14px; height:14px; --dur: 6s;"></div>
    <div class="star" style="left:24%; top:22%; width:8px; height:8px; --dur: 4.6s;"></div>
    <div class="star" style="left:31%; top:30%; width:6px; height:6px; --dur: 5.5s;"></div>
    <div class="star cross" style="left:39%; top:8%; width:9px; height:9px; --dur: 6.2s;"></div>
    <div class="star" style="left:61%; top:11%; width:7px; height:7px; --dur: 5.8s;"></div>
    <div class="star cross" style="left:83%; top:15%; width:10px; height:10px; --dur: 4.4s;"></div>
    <div class="star" style="left:88%; top:55%; width:8px; height:8px; --dur: 5.1s;"></div>
    <div class="star cross" style="left:80%; top:79%; width:9px; height:9px; --dur: 5.9s;"></div>
    <div class="star" style="left:93%; top:92%; width:6px; height:6px; --dur: 6.1s;"></div>
    <div class="star" style="left:16%; top:43%; width:7px; height:7px; --dur: 4.9s;"></div>
  </div>

  <div class="container">
    <div class="image-wrapper">
      <picture>
        <source srcset="./assets/welcome-illustration.webp" type="image/webp" />
        <img src="./assets/welcome-illustration.png" alt="JemsPantry Welcome Illustration" />
      </picture>

      <div class="magic-focus">
        <svg class="magic-svg" viewBox="0 0 1000 1600" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
          <defs>
            <linearGradient id="goldTrail" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="rgba(255,210,120,0)" />
              <stop offset="25%" stop-color="rgba(255,222,150,0.45)" />
              <stop offset="55%" stop-color="rgba(255,245,210,1)" />
              <stop offset="100%" stop-color="rgba(255,210,120,0)" />
            </linearGradient>
          </defs>

          <!-- Swirl 1: wraps around torso -->
          <path id="swirl1" class="swirl-path trail-back"
            d="M305,970
               C365,860 505,810 610,850
               C700,885 718,980 655,1035
               C595,1088 485,1078 415,1010
               C365,962 360,910 392,870" />

          <path class="swirl-path trail-mid"
            d="M305,970
               C365,860 505,810 610,850
               C700,885 718,980 655,1035
               C595,1088 485,1078 415,1010
               C365,962 360,910 392,870" />

          <path class="swirl-path trail-front"
            d="M305,970
               C365,860 505,810 610,850
               C700,885 718,980 655,1035
               C595,1088 485,1078 415,1010
               C365,962 360,910 392,870" />

          <!-- Swirl 2: climbs toward phone -->
          <path id="swirl2" class="swirl-path trail-back"
            d="M420,1080
               C520,1035 660,970 705,865
               C735,795 700,730 635,718
               C575,706 530,744 530,796
               C530,836 560,862 595,857
               C645,850 672,802 680,740" />

          <path class="swirl-path trail-mid"
            d="M420,1080
               C520,1035 660,970 705,865
               C735,795 700,730 635,718
               C575,706 530,744 530,796
               C530,836 560,862 595,857
               C645,850 672,802 680,740" />

          <path class="swirl-path trail-front"
            d="M420,1080
               C520,1035 660,970 705,865
               C735,795 700,730 635,718
               C575,706 530,744 530,796
               C530,836 560,862 595,857
               C645,850 672,802 680,740" />

          <!-- Swirl 3: small orbit around the phone -->
          <path id="swirl3" class="swirl-path trail-back"
            d="M645,780
               C700,760 748,780 760,830
               C770,878 742,918 695,926
               C642,936 595,900 592,850
               C588,805 620,787 645,780" />

          <path class="swirl-path trail-mid"
            d="M645,780
               C700,760 748,780 760,830
               C770,878 742,918 695,926
               C642,936 595,900 592,850
               C588,805 620,787 645,780" />

          <path class="swirl-path trail-front"
            d="M645,780
               C700,760 748,780 760,830
               C770,878 742,918 695,926
               C642,936 595,900 592,850
               C588,805 620,787 645,780" />

          <!-- Sparkles running on paths -->
          <circle class="sparkle-dot large">
            <animateMotion dur="5.8s" repeatCount="indefinite" rotate="auto">
              <mpath href="#swirl1" />
            </animateMotion>
          </circle>

          <circle class="sparkle-dot soft">
            <animateMotion dur="7.4s" begin="-1.3s" repeatCount="indefinite" rotate="auto">
              <mpath href="#swirl1" />
            </animateMotion>
          </circle>

          <circle class="sparkle-dot">
            <animateMotion dur="4.9s" begin="-0.8s" repeatCount="indefinite" rotate="auto">
              <mpath href="#swirl2" />
            </animateMotion>
          </circle>

          <circle class="sparkle-dot large">
            <animateMotion dur="6.4s" begin="-2.2s" repeatCount="indefinite" rotate="auto">
              <mpath href="#swirl2" />
            </animateMotion>
          </circle>

          <circle class="sparkle-dot">
            <animateMotion dur="3.8s" begin="-0.6s" repeatCount="indefinite" rotate="auto">
              <mpath href="#swirl3" />
            </animateMotion>
          </circle>

          <circle class="sparkle-dot soft">
            <animateMotion dur="5.1s" begin="-1.8s" repeatCount="indefinite" rotate="auto">
              <mpath href="#swirl3" />
            </animateMotion>
          </circle>

          <!-- Extra static sparkle clusters -->
          <g opacity="0.85">
            <circle class="sparkle-dot soft" cx="394" cy="922" />
            <circle class="sparkle-dot" cx="430" cy="875" />
            <circle class="sparkle-dot large" cx="525" cy="860" />
            <circle class="sparkle-dot soft" cx="615" cy="888" />
            <circle class="sparkle-dot" cx="687" cy="843" />
            <circle class="sparkle-dot soft" cx="742" cy="830" />
            <circle class="sparkle-dot large" cx="706" cy="756" />
            <circle class="sparkle-dot soft" cx="646" cy="792" />
            <circle class="sparkle-dot" cx="607" cy="907" />
            <circle class="sparkle-dot soft" cx="470" cy="1018" />
          </g>
        </svg>
      </div>
    </div>
  </div>
</body>
</html>
