  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      background: #1a3a29;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .image-wrapper {
      width: min(100%, 900px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .image-wrapper picture,
    .image-wrapper img {
      display: block;
      width: 100%;
      height: auto;
    }

    .image-wrapper img {
      object-fit: contain;
    }

    @media (max-width: 768px) {
      .container {
        padding: 0;
      }

      .image-wrapper {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="image-wrapper">
      <picture>
        <source srcset="./assets/welcome-illustration.webp" type="image/webp" />
        <img src="./assets/welcome-illustration.png" alt="JemsPantry Welcome Illustration" />
      </picture>
    </div>
  </div>
</body>
