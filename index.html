<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JemsPantry - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-green: #2d6a4f;
            --light-cream: #f5e6d3;
            --accent-gold: #d4a574;
            --text-light: #f0f0f0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background: linear-gradient(135deg, #2d6a4f 0%, #1f4d37 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Animated stars background */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .star {
            position: absolute;
            opacity: 0;
            filter: drop-shadow(0 0 2px rgba(245, 230, 211, 0.6));
            animation: twinkle 5s infinite;
        }

        /* Vary star sizes */
        .star:nth-child(1) { width: 20px; height: 20px; animation-delay: 0s; }
        .star:nth-child(2) { width: 15px; height: 15px; animation-delay: 0.3s; }
        .star:nth-child(3) { width: 25px; height: 25px; animation-delay: 0.6s; }
        .star:nth-child(4) { width: 12px; height: 12px; animation-delay: 0.9s; }
        .star:nth-child(5) { width: 18px; height: 18px; animation-delay: 1.2s; }
        .star:nth-child(6) { width: 22px; height: 22px; animation-delay: 1.5s; }
        .star:nth-child(7) { width: 14px; height: 14px; animation-delay: 1.8s; }
        .star:nth-child(8) { width: 20px; height: 20px; animation-delay: 2.1s; }
        .star:nth-child(9) { width: 16px; height: 16px; animation-delay: 2.4s; }
        .star:nth-child(10) { width: 24px; height: 24px; animation-delay: 2.7s; }
        .star:nth-child(11) { width: 13px; height: 13px; animation-delay: 3s; }
        .star:nth-child(12) { width: 19px; height: 19px; animation-delay: 3.3s; }
        .star:nth-child(13) { width: 21px; height: 21px; animation-delay: 3.6s; }
        .star:nth-child(14) { width: 15px; height: 15px; animation-delay: 3.9s; }
        .star:nth-child(15) { width: 17px; height: 17px; animation-delay: 4.2s; }
        .star:nth-child(16) { width: 23px; height: 23px; animation-delay: 0.5s; }
        .star:nth-child(17) { width: 11px; height: 11px; animation-delay: 0.8s; }
        .star:nth-child(18) { width: 18px; height: 18px; animation-delay: 1.1s; }
        .star:nth-child(19) { width: 20px; height: 20px; animation-delay: 1.4s; }
        .star:nth-child(20) { width: 14px; height: 14px; animation-delay: 1.7s; }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0;
            }
            40% {
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
            60% {
                opacity: 1;
            }
            70% {
                opacity: 0;
            }
        }

        .star:nth-child(1) { left: 25%; top: 15%; }
        .star:nth-child(2) { left: 32%; top: 18%; }
        .star:nth-child(3) { left: 38%; top: 20%; }
        .star:nth-child(4) { left: 42%; top: 25%; }
        .star:nth-child(5) { left: 45%; top: 32%; }
        .star:nth-child(6) { left: 46%; top: 40%; }
        .star:nth-child(7) { left: 44%; top: 48%; }
        .star:nth-child(8) { left: 40%; top: 54%; }
        .star:nth-child(9) { left: 35%; top: 58%; }
        .star:nth-child(10) { left: 28%; top: 60%; }
        .star:nth-child(11) { left: 65%; top: 20%; }
        .star:nth-child(12) { left: 70%; top: 28%; }
        .star:nth-child(13) { left: 72%; top: 36%; }
        .star:nth-child(14) { left: 70%; top: 44%; }
        .star:nth-child(15) { left: 65%; top: 52%; }
        .star:nth-child(16) { left: 58%; top: 58%; }
        .star:nth-child(17) { left: 20%; top: 35%; }
        .star:nth-child(18) { left: 22%; top: 42%; }
        .star:nth-child(19) { left: 52%; top: 18%; }
        .star:nth-child(20) { left: 78%; top: 38%; }

        /* Main container */
        .container {
            position: relative;
            z-index: 2;
            max-width: 600px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeInUp 1s ease-out;
        }

        .image-wrapper {
            display: inline-block;
            position: relative;
            max-width: 500px;
            width: 90vw;
            height: auto;
            z-index: 3;
        }

        .image-wrapper picture {
            display: block;
        }

        .image-wrapper img {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        .image-wrapper img:hover {
            transform: scale(1.02);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .image-wrapper img:hover {
                transform: scale(1.01);
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .image-wrapper img:hover {
                transform: scale(1);
            }
        }
    </style>
</head>
